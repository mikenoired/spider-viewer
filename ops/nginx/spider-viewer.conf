upstream spider_viewer_app {
	include /etc/nginx/spider-viewer-upstream.conf;
	keepalive 32;
}

server {
	listen 80;
	listen [::]:80;
	server_name www.npp-spider.ru;
	return 301 https://npp-spider.ru$request_uri;
}

server {
	listen 80;
	listen [::]:80;
	server_name npp-spider.ru;
	return 301 https://npp-spider.ru$request_uri;
}

server {
	listen 443 ssl;
	listen [::]:443 ssl;
	server_name www.npp-spider.ru;

	ssl_certificate /etc/letsencrypt/live/npp-spider.ru/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/npp-spider.ru/privkey.pem;
	include /etc/letsencrypt/options-ssl-nginx.conf;
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
	add_header Strict-Transport-Security "max-age=2592000" always;

	return 301 https://npp-spider.ru$request_uri;
}

server {
	listen 443 ssl;
	listen [::]:443 ssl;
	server_name npp-spider.ru;

	root /opt/spider-viewer/current/dist/client;
	index index.html;

	client_max_body_size 20m;

	ssl_certificate /etc/letsencrypt/live/npp-spider.ru/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/npp-spider.ru/privkey.pem;
	include /etc/letsencrypt/options-ssl-nginx.conf;
	ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
	add_header Strict-Transport-Security "max-age=2592000" always;

	location = /healthz {
		proxy_pass http://spider_viewer_app;
		include /etc/nginx/proxy_params;
		proxy_set_header Host $host;
	}

	location = /readyz {
		proxy_pass http://spider_viewer_app;
		include /etc/nginx/proxy_params;
		proxy_set_header Host $host;
	}

	location /assets/ {
		try_files $uri =404;
		access_log off;
		expires 1y;
		add_header Cache-Control "public, immutable";
	}

	location = /favicon.ico {
		try_files $uri @app;
		access_log off;
		expires 1d;
	}

	location / {
		try_files $uri @app;
	}

	location @app {
		proxy_http_version 1.1;
		proxy_set_header Connection "";
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-Forwarded-Host $host;
		proxy_set_header X-Forwarded-Port $server_port;
		proxy_read_timeout 60s;
		proxy_connect_timeout 5s;
		proxy_pass http://spider_viewer_app;
	}
}
